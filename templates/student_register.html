{% extends 'base.html' %}
{% block content %}
<section class="grid single-panel">
  <article class="card">
    <h2>Registro de alumno</h2>
    <p>Crea tu cuenta. Por defecto se asigna el rol de alumno.</p>

    {% if error %}
      <div class="result"><div class="error">{{ error }}</div></div>
    {% endif %}

    <form method="post" class="form">
      <label>Nombre completo</label>
      <input name="full_name" required>

      <label>Numero de cuenta</label>
      <input name="student_code" required>

      <label>Grupo y turno</label>
      <input name="classroom" required>

      <label>Contrasena</label>
      <input type="password" name="password" required>

      <label>Confirmar contrasena</label>
      <input type="password" name="confirm_password" required>

      <button class="btn" type="submit">Registrar y entrar</button>
    </form>

    <p>Si ya tienes cuenta, entra con tu numero de cuenta y contrasena para completar tus datos.</p>
    <div class="actions">
      <a class="btn" href="{{ url_for('menu') }}">Iniciar sesion</a>
    </div>
  </article>
</section>
{% endblock %}
