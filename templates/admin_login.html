{% extends 'base.html' %}
{% block content %}
<section class="grid single-panel">
  <article class="card">
    <h2>Acceso</h2>
    <p>Usa esta pantalla única para entrar como admin o como alumno.</p>
    <p class="muted">Admin y alumno se distinguen por el valor guardado en la base de datos.</p>

    {% if error %}
      <div class="result"><div class="error">{{ error }}</div></div>
    {% endif %}

    <form method="post" class="form">
      <label>Usuario</label>
      <input name="username" required>

      <label>Contrasena</label>
      <input type="password" name="password" required>

      <button class="btn" type="submit">Entrar</button>
    </form>

    <div class="actions">
      <a class="btn" href="{{ url_for('student_register') }}">Crear cuenta de alumno</a>
      <a class="btn" href="{{ url_for('menu') }}">Volver al inicio</a>
    </div>
  </article>
</section>
{% endblock %}
