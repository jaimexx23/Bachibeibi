{% extends 'base.html' %}
{% block content %}
<section class="card center">
  <h2>QR de alumno</h2>
  <p><strong>{{ student.full_name }}</strong></p>
  <p>Codigo: {{ student.student_code }} | Grupo: {{ student.classroom }}</p>
  <img class="qr" src="data:image/png;base64,{{ qr_base64 }}" alt="QR alumno">
  <p>Imprime o guarda este QR para el alumno.</p>
  <a class="btn" href="{{ url_for('students') }}">Volver</a>
</section>
{% endblock %}
